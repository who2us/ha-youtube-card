# .github/workflows/release.yml
#
# This workflow runs whenever you push a version tag like "v1.0.0".
# It builds the card, then creates a GitHub Release with the built JS file
# attached — which is what HACS downloads and delivers to users.
#
# How to trigger a release:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*'   # Matches v1.0.0, v1.2.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the production bundle
      - name: Build
        run: NODE_ENV=production npm run build

      # 5. Create a GitHub Release and attach the built JS file
      #    HACS looks for this file in the release assets
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ha-youtube-card.js
          generate_release_notes: true   # Auto-generates notes from commit messages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
